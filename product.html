<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnaval Perfume - Product View</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
         :root {
            --bg-color: #0A192F;
            --text-color: #F5F2EB;
            --gold: #C5A572;
            --gold-hover: #e0bc84;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        h1,
        h2,
        h3,
        h4,
        .playfair {
            font-family: 'Playfair Display', serif;
        }
        
        a {
            color: inherit;
            text-decoration: none;
        }
        
        button {
            cursor: none;
            font-family: inherit;
            border: none;
            background: transparent;
        }
        
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }
        
        .cursor-grow {
            width: 40px;
            height: 40px;
            background-color: rgba(197, 165, 114, 0.2);
        }
        
        @media (max-width: 768px) {
            .cursor {
                display: none;
            }
            * {
                cursor: auto !important;
            }
        }
        
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
        }
        
        nav {
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
        }
        
        .nav-icons {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        
        .nav-icons a,
        .nav-icons i {
            font-size: 1.2rem;
            transition: color 0.3s;
            position: relative;
            color: inherit;
            cursor: pointer;
        }
        
        .nav-icons a:hover,
        .nav-icons i:hover {
            color: var(--gold);
        }
        
        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #27ae60;
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50%;
        }
        
        .product-container {
            padding: 4rem 5%;
            display: flex;
            gap: 4rem;
            position: relative;
            z-index: 2;
            flex: 1;
        }
        
        .gallery-sec {
            flex: 1;
            position: relative;
            display: flex;
            gap: 1rem;
        }
        
        .thumbnails {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .thumbnails img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            opacity: 0.6;
            transition: 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
        }
        
        .thumbnails img.active,
        .thumbnails img:hover {
            opacity: 1;
            border-color: var(--gold);
        }
        
        .main-image-container {
            position: relative;
            flex: 1;
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .main-image {
            width: 80%;
            height: auto;
            max-height: 80%;
            object-fit: contain;
            z-index: 1;
            position: relative;
            border-radius: 10px;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
        }
        
        .info-sec {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .brand {
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        
        .title {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .rating {
            color: #f1c40f;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .rating span {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        .price {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 2rem;
            color: var(--gold);
        }
        
        .desc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 2rem;
        }
        
        .notes {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            border-left: 3px solid var(--gold);
        }
        
        html[dir="rtl"] .notes {
            border-left: none;
            border-right: 3px solid var(--gold);
        }
        
        .actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .btn-add {
            flex: 1;
            background: var(--gold);
            color: #000;
            font-weight: bold;
            padding: 1rem;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            transition: transform 0.3s;
            cursor: pointer;
        }
        
        .btn-add:hover {
            transform: scale(1.05);
            background: var(--gold-hover);
        }
        
        .btn-wish {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #fff;
            font-size: 1.5rem;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .btn-wish:hover,
        .btn-wish.active {
            color: #ff4757;
            border-color: #ff4757;
        }
        
        .share {
            display: flex;
            gap: 1rem;
            align-items: center;
            color: #aaa;
        }
        
        .share a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            color: #fff;
        }
        
        .share a:hover {
            background: var(--gold);
            color: #000;
            transform: translateY(-3px);
        }
        
        .similar-sec {
            padding: 4rem 5%;
            position: relative;
            z-index: 2;
        }
        
        .similar-sec h2 {
            text-align: center;
            margin-bottom: 3rem;
            font-size: 2rem;
        }
        
        .similar-grid {
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            padding-bottom: 2rem;
        }
        
        .similar-card {
            min-width: 250px;
            background: var(--glass-bg);
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        
        .similar-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }
        
        .similar-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        /* OVERLAY */
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        /* LEGENDARY SIDE DRAWER */
        
        .side-drawer {
            position: fixed;
            top: 0;
            width: 450px;
            height: 100%;
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 1002;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(197, 165, 114, 0.2);
        }
        
        html[dir="rtl"] .side-drawer {
            right: -450px;
            border-right: none;
            border-radius: 24px 0 0 24px;
            padding: 2rem;
        }
        
        html[dir="ltr"] .side-drawer {
            right: -450px;
            border-left: none;
            border-radius: 24px 0 0 24px;
            padding: 2rem;
        }
        
        .side-drawer.active {
            transform: translateX(-450px);
        }
        
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .drawer-header h2 {
            color: var(--gold);
            font-size: 1.8rem;
        }
        
        .close-btn {
            font-size: 1.5rem;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .close-btn:hover {
            color: #ff4757;
            transform: rotate(90deg);
        }
        
        .cart-items,
        .wishlist-items {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        
        .cart-items::-webkit-scrollbar {
            width: 6px;
        }
        
        .cart-items::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }
        
        .cart-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            transition: 0.3s;
        }
        
        .cart-item:hover {
            border-color: rgba(197, 165, 114, 0.4);
            transform: translateX(-5px);
        }
        
        html[dir="ltr"] .cart-item:hover {
            transform: translateX(5px);
        }
        
        .cart-item img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-top: 0.8rem;
        }
        
        .qty-controls button {
            background: var(--glass-bg);
            color: #fff;
            border: 1px solid var(--glass-border);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .qty-controls button:hover {
            background: var(--gold);
            color: #000;
        }
        
        .remove-btn {
            position: absolute;
            left: 1rem;
            top: 1rem;
            color: #aaa;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
        }
        
        html[dir="ltr"] .remove-btn {
            left: auto;
            right: 1rem;
        }
        
        .remove-btn:hover {
            color: #ff4757;
            transform: scale(1.2) rotate(-5deg);
        }
        
        .cart-footer {
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }
        
        .totals-row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: #ccc;
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
            font-weight: bold;
            color: var(--gold);
            border-top: 1px dashed rgba(197, 165, 114, 0.3);
            padding-top: 1rem;
        }
        
        .checkout-btn {
            width: 100%;
            display: block;
            text-align: center;
            padding: 1.2rem;
            background: linear-gradient(135deg, #e0bc84 0%, #C5A572 100%);
            color: #000;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(197, 165, 114, 0.2);
            margin-bottom: 0.8rem;
            position: relative;
            overflow: hidden;
        }
        
        .checkout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(197, 165, 114, 0.4);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
        
        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .checkout-btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out;
            pointer-events: none;
        }
        
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        
        .continue-btn {
            width: 100%;
            display: block;
            text-align: center;
            padding: 1rem;
            background: transparent;
            color: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            font-weight: 500;
            font-size: 1rem;
            transition: 0.3s;
        }
        
        .continue-btn:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .empty-cart-msg {
            text-align: center;
            color: #aaa;
            margin-top: 3rem;
        }
        
        .empty-cart-msg i {
            font-size: 4rem;
            color: rgba(197, 165, 114, 0.3);
            margin-bottom: 1rem;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff;
            color: #0A192F;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast-icon {
            color: #27ae60;
        }
        /* FOOTER */
        
        .footer {
            position: relative;
            margin-top: 3rem;
            background: #071324;
            text-align: center;
            padding: 3rem 1rem 2rem;
            border-top: 1px solid var(--glass-border);
        }
        
        .footer-text {
            font-size: 1rem;
            color: #ccc;
            z-index: 2;
            position: relative;
            font-weight: 500;
        }
        
        .wave-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            overflow: hidden;
        }
        
        .animated-wave {
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, #C5A572, #e0bc84, #f5f2eb, #e0bc84, #C5A572);
            background-size: 50% 100%;
            animation: waveMove 3s linear infinite;
        }
        
        @keyframes waveMove {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        @media (max-width: 900px) {
            .product-container {
                flex-direction: column;
                padding: 2rem 5%;
            }
            .gallery-sec {
                flex-direction: column-reverse;
            }
            .thumbnails {
                flex-direction: row;
                justify-content: center;
                overflow-x: auto;
            }
            .main-image-container {
                height: 400px;
            }
            .title {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 768px) {
            .side-drawer {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
            html[dir="rtl"] .side-drawer {
                right: -100%;
            }
            html[dir="ltr"] .side-drawer {
                right: -100%;
            }
            .side-drawer.active {
                transform: translateX(-100%);
            }
        }
    </style>
</head>
